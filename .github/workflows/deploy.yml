name: Docker Build and Deploy

on:
  push:
    branches: [ master ]
    paths:
      - 'API/**'
      - 'Application/**'
      - 'Domain/**'
      - 'Infrastructure/**'
      - 'docker-compose.yml'

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
  REMOTE_USER: ${{ secrets.REMOTE_USER }}
  PROJECT_PATH: /home/kedrov/backend-docker
  IMAGE_NAME: realty-service-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    needs: test
    if: success()

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKERHUB_USERNAME }}/realty-service-backend
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix=sha-
          type=raw,value=${{ github.run_number }}
          type=raw,value=main

    - name: Build and push backend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./API/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILD_CONFIGURATION=Release
          VERSION=${{ github.run_number }}

    - name: Verify image pushed
      run: |
        echo "Image pushed successfully with tags: ${{ steps.meta.outputs.tags }}"

    - name: Install SSH key
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Create deployment directory on server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ env.REMOTE_USER }}@${{ env.REMOTE_HOST }} \
          "mkdir -p ${{ env.PROJECT_PATH }}"

    - name: Copy docker-compose.yml to server
      run: |
        scp -o StrictHostKeyChecking=no docker-compose.yml ${{ env.REMOTE_USER }}@${{ env.REMOTE_HOST }}:${{ env.PROJECT_PATH }}/docker-compose.yml

    - name: Copy .env file to server (if exists)
      run: |
        if [ -f .env ]; then
          scp -o StrictHostKeyChecking=no .env ${{ env.REMOTE_USER }}@${{ env.REMOTE_HOST }}:${{ env.PROJECT_PATH }}/.env
        fi

    - name: Deploy to server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ env.REMOTE_USER }}@${{ env.REMOTE_HOST }} << 'EOF'
          set -e
          
          echo "Starting deployment..."
          cd ${{ env.PROJECT_PATH }}
          
          echo "Pulling latest image..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          
          echo "Stopping old containers..."
          docker compose down || true
          
          echo "Removing old images..."
          docker image prune -f
          
          echo "Starting new containers..."
          docker compose up -d
          
          
          echo "Checking container status..."
          docker compose ps
          
          echo "Checking backend logs..."
          docker compose logs --tail=50 backend
          
          echo "Deployment completed successfully!"
        EOF

    - name: Rollback on failure
      if: failure()
      run: |
        ssh -o StrictHostKeyChecking=no ${{ env.REMOTE_USER }}@${{ env.REMOTE_HOST }} << 'EOF'
          cd ${{ env.PROJECT_PATH }}
          echo "Deployment failed, rolling back..."
          docker compose down
          docker compose up -d
          echo "Rollback completed"
        EOF

  cleanup:
    runs-on: ubuntu-latest
    needs: build-and-deploy
    if: always()
    steps:
    - name: Cleanup old Docker images on server
      run: |
        ssh -o StrictHostKeyChecking=no ${{ env.REMOTE_USER }}@${{ env.REMOTE_HOST }} << 'EOF'
          echo "Cleaning up old Docker images..."
          docker system prune -af --filter "until=24h"
          echo " Cleanup completed"
        EOF